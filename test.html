<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北高 連絡帳 (MK-18)</title>
    <style>
        :root {
            --primary: #06C755;
            --bg-color: #f8f9fa;
            --text-main: #111111;
            --text-sub: #666666;
            --card-bg: #ffffff;
            --border: #eaeaec;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0; padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--card-bg);
            padding: 16px; text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        header h1 { margin: 0; font-size: 1.1rem; color: var(--primary); font-weight: 700; }

        .container { padding: 16px; }

        .tab-content { display: none; opacity: 0; }
        .tab-content.active { display: block; opacity: 1; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 検索・フィルター */
        .search-box { position: relative; margin-bottom: 16px; }
        .search-box input { width: 100%; padding: 12px 16px 12px 40px; background-color: #f0f1f3; border: none; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #999; }
        
        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 16px; background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--text-sub); white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background-color: var(--text-main); color: #fff; border-color: var(--text-main); }

        /* カード */
        .card {
            background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s; cursor: pointer;
        }
        .card:active { transform: scale(0.96); background-color: #f9f9f9; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap;}
        .name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .badge { background-color: #f0f1f3; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: var(--text-sub); font-weight: 600; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
        .status-zaiju { background-color: #e8f5e9; color: #2e7d32; }
        .status-yotei { background-color: #fff3e0; color: #e65100; }
        .status-kisei { background-color: #ffebee; color: #c62828; }
        .card-body { font-size: 0.9rem; color: var(--text-sub); line-height: 1.5; }
        .card-body strong { color: var(--text-main); font-weight: 600; }

        /* ボトムナビ */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; border-top: 1px solid var(--border);
            padding: 10px 0 20px 0; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; color: #999; font-weight: 600; width: 25%; cursor: pointer; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 1.4rem; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); }

        /* ========= 更新用モーダル (ボトムシート) ========= */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: block; opacity: 1; }
        .modal-content {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 24px; box-sizing: border-box;
            transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-content { bottom: 0; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 1.2rem; }
        .close-btn { font-size: 1.8rem; color: #999; border: none; background: none; cursor: pointer; padding: 0; line-height: 1; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; color: var(--text-sub); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .form-control:focus { outline: 2px solid var(--primary); border-color: transparent; }
        .form-control[readonly] { background-color: #f0f1f3; color: #888; }
        
        .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .radio-label { display: flex; align-items: center; gap: 4px; font-size: 0.95rem; }
        
        .btn-submit {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 8px;
        }
        .btn-submit:active { opacity: 0.8; }
    </style>
</head>
<body>

    <header><h1>MK-18 連絡帳</h1></header>

    <main class="container">
        <!-- ① 出没レーダー -->
        <section id="radar" class="tab-content active">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="名前・趣味・ひとことで検索..." oninput="filterData()">
            </div>
            <div class="filter-scroll" id="statusFilters">
                <div class="filter-chip active" onclick="setFilter('すべて', this)">すべて</div>
                <div class="filter-chip" onclick="setFilter('在住', this)">在住</div>
                <div class="filter-chip" onclick="setFilter('帰省予定', this)">帰省予定</div>
                <div class="filter-chip" onclick="setFilter('帰省中', this)">帰省中</div>
            </div>
            
            <div id="radar-list"></div>
        </section>

        <!-- ②〜④ 省略 (前回と同じ) -->
        <section id="board" class="tab-content"><div class="empty-state">📌<br>コルクボード</div></section>
        <section id="club" class="tab-content"><div class="empty-state">🏫<br>部室</div></section>
        <section id="safety" class="tab-content"><div class="empty-state">🔰<br>安心宣言</div></section>
    </main>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('radar', this)"><span class="nav-icon">📡</span>レーダー</div>
        <div class="nav-item" onclick="switchTab('board', this)"><span class="nav-icon">📌</span>ボード</div>
        <div class="nav-item" onclick="switchTab('club', this)"><span class="nav-icon">🏫</span>部室</div>
        <div class="nav-item" onclick="switchTab('safety', this)"><span class="nav-icon">🔰</span>安心宣言</div>
    </nav>

    <!-- ========= 近況更新モーダル ========= -->
    <div id="editModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>近況を更新する</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>お名前（変更不可）</label>
                <input type="text" id="editName" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>誕生日4桁（本人確認） <span style="color:#e65100;">*</span></label>
                <input type="number" id="editPw" class="form-control" placeholder="例: 0401 (テスト用は 0101)">
            </div>
            <div class="form-group">
                <label>現在のエリア</label>
                <select id="editArea" class="form-control">
                    <option value="松山市">松山市</option>
                    <option value="東京都">東京都</option>
                    <option value="大阪府">大阪府</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="form-group">
                <label>現在の状態</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="editStatus" value="在住">在住</label>
                    <label class="radio-label"><input type="radio" name="editStatus" value="帰省予定">帰省予定</label>
                    <label class="radio-label"><input type="radio" name="editStatus" value="帰省中">帰省中</label>
                </div>
            </div>
            <div class="form-group">
                <label>ひとこと近況</label>
                <textarea id="editComment" class="form-control" rows="3" placeholder="最近の出来事など..."></textarea>
            </div>
            
            <input type="hidden" id="editId">
            <button class="btn-submit" onclick="submitUpdate()">更新する</button>
        </div>
    </div>

    <script>
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // --- ダミーデータ (テスト用に誕生日0101を設定) ---
        let membersData = [
            { id: 1, name: "佐々木 宗明", pw: "0101", period: "33期", club: "情報処理部", area: "松山市", status: "在住", hobby: "サイクリング, RPA", comment: "デジタル回覧板作ってます！" },
            { id: 2, name: "石垣 陽太", pw: "0101", period: "35期", club: "テニス部", area: "東京都", status: "帰省予定", hobby: "カメラ", comment: "お盆に帰ります。" },
            { id: 3, name: "林家 染太", pw: "0101", period: "33期", club: "落語研究会", area: "大阪府", status: "帰省中", hobby: "落語", comment: "松山で寄席やります！" }
        ];

        let currentFilter = 'すべて';

        function setFilter(status, element) {
            currentFilter = status;
            document.querySelectorAll('.filter-chip').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            filterData();
        }

        function filterData() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const listContainer = document.getElementById('radar-list');
            listContainer.innerHTML = ''; 

            const filteredData = membersData.filter(m => 
                (currentFilter === 'すべて' || m.status === currentFilter) &&
                (m.name.includes(searchText) || m.hobby.includes(searchText) || m.comment.includes(searchText))
            );

            filteredData.forEach(member => {
                let sClass = member.status === '帰省予定' ? 'status-yotei' : member.status === '帰省中' ? 'status-kisei' : 'status-zaiju';
                
                // ★カードに onclick="openModal(ID)" を追加★
                const card = `
                    <div class="card" onclick="openModal(${member.id})">
                        <div class="card-header">
                            <div class="user-info">
                                <span class="name">${member.name}</span>
                                <span class="badge">${member.period}</span>
                            </div>
                            <span class="status-badge ${sClass}">${member.status}</span>
                        </div>
                        <div class="card-body">
                            <div style="margin-bottom: 6px;"><strong>エリア:</strong> ${member.area}</div>
                            <div><strong>近況:</strong> ${member.comment}</div>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', card);
            });
        }

        // --- モーダル (修正画面) 制御ロジック ---
        function openModal(id) {
            const target = membersData.find(m => m.id === id);
            if(!target) return;

            // フォームに既存データをセット
            document.getElementById('editId').value = target.id;
            document.getElementById('editName').value = target.name;
            document.getElementById('editPw').value = ""; // パスワードは空にする
            document.getElementById('editArea').value = target.area;
            document.getElementById('editComment').value = target.comment;
            
            // ラジオボタンの選択
            document.querySelectorAll('input[name="editStatus"]').forEach(radio => {
                radio.checked = (radio.value === target.status);
            });

            // モーダルを表示（アニメーション）
            const overlay = document.getElementById('editModal');
            overlay.style.display = 'block';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function closeModal(event) {
            // 背景クリックか×ボタンで閉じる
            if(event && event.target !== document.getElementById('editModal') && !event.target.classList.contains('close-btn')) return;
            const overlay = document.getElementById('editModal');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        function submitUpdate() {
            const id = parseInt(document.getElementById('editId').value);
            const inputPw = document.getElementById('editPw').value;
            const newArea = document.getElementById('editArea').value;
            const newComment = document.getElementById('editComment').value;
            const newStatus = document.querySelector('input[name="editStatus"]:checked').value;

            const targetIndex = membersData.findIndex(m => m.id === id);
            
            // ★本人確認チェック★
            if (inputPw !== membersData[targetIndex].pw) {
                alert("エラー：誕生日（パスワード）が間違っています。");
                return;
            }

            // データの更新 (本来はここでGASに送信します)
            membersData[targetIndex].area = newArea;
            membersData[targetIndex].status = newStatus;
            membersData[targetIndex].comment = newComment;

            alert("近況を更新しました！");
            closeModal();
            filterData(); // 画面を再描画して変更を反映
        }

        filterData();
    </script>
</body>
</html>
