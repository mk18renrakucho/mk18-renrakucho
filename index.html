<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北高 連絡帳</title>
    <style>
        :root { --primary: #0C447C; --bg: #F5F6F8; --border: #E0E0E0; --white: #fff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        
        .top-tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); }
        .tab-item { flex: 1; padding: 14px 8px; text-align: center; font-size: 0.85rem; font-weight: bold; color: #666; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .control-area { background: var(--white); padding: 16px; border-bottom: 1px solid var(--border); }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        
        /* 1. 出没レーダー：隠すボタン */
        .filter-toggle { margin-top: 10px; width: 100%; padding: 8px; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .filter-panel { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
        
        /* 2. コルクボード：横並び3ボタン */
        .board-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .board-btn { padding: 10px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .board-btn.active { background: var(--primary); color: white; }
        
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>

<div class="top-tabs">
    <div class="tab-item active" onclick="switchTab('radar', this)">出没レーダー</div>
    <div class="tab-item" onclick="switchTab('board', this)">コルクボード</div>
    <div class="tab-item">部室</div>
    <div class="tab-item">お気に入り</div>
    <div class="tab-item">安心宣言</div>
</div>

<main>
    <div id="radar" class="content active">
        <div class="control-area">
            <input type="text" placeholder="名前・趣味などで検索">
            <button class="filter-toggle" onclick="toggleFilter()">絞り込み条件を表示する ▼</button>
            <div id="filter-panel" class="filter-panel">
                <select style="margin-bottom:8px;"><option>全部活</option></select>
                <select style="margin-bottom:8px;"><option>全エリア</option></select>
                <select><option>全状態</option></select>
            </div>
        </div>
    </div>

    <div id="board" class="content">
        <div class="control-area">
            <input type="text" placeholder="タイトル検索...">
            <div class="board-btns">
                <button class="board-btn active">すべて</button>
                <button class="board-btn">告知</button>
                <button class="board-btn">近況</button>
            </div>
        </div>
    </div>
</main>

<script>
    function switchTab(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function toggleFilter() {
        const panel = document.getElementById('filter-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
